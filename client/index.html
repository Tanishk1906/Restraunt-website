<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savoria | Fine Dining</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <h1 class="logo">Savoria.</h1>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#reservation">Book a Table</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <header id="home" class="hero">
        <div class="hero-content">
            <h2>Experience Taste Like Never Before</h2>
            <p>Authentic flavors, modern ambiance.</p>
            <a href="#menu" class="btn">Explore Menu</a>
        </div>
    </header>

    <!-- Menu Section -->
    <section id="menu" class="menu-section">
        <div class="menu-header">
            <h2>Our Exquisite Menu</h2>
            <p>Savor hand-crafted delicacies from morning to night</p>
        </div>

        <div class="menu-tabs">
            <button class="tab-btn active" onclick="openMenu(event, 'Breakfast')">🍳 Breakfast</button>
            <button class="tab-btn" onclick="openMenu(event, 'Lunch')">🍛 Lunch</button>
            <button class="tab-btn" onclick="openMenu(event, 'Dinner')">🍲 Dinner</button>
            <button class="tab-btn" onclick="openMenu(event, 'Thali')">🍱 Special Thalis</button>
        </div>

        <div id="menu-content" class="menu-content-container">
            </div>
    </section>

    <!-- Reservation Section -->
    <section id="reservation" class="reservation-section">
        <h2>Book Your Table</h2>
        <form id="reservation-form">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <input type="date" id="date" required>
            <input type="number" id="guests" placeholder="Number of Guests" min="1" required>
            <button type="submit" class="btn">Confirm Booking</button>
        </form>
        <p id="form-message"></p>
    </section>

    <script src="app.js"></script>
</body>
</html>
